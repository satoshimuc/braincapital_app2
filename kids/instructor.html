<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNLOCK — インストラクター</title>
  <link rel="stylesheet" href="/kids/css/kids.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-config.js"></script>
</head>
<body>

  <!-- ===== Top bar ===== -->
  <div class="topbar">
    <div>
      <span class="topbar-logo">UNLOCK</span>
      <span class="topbar-org" id="topbar-org"></span>
    </div>
    <div class="topbar-right">
      <span class="topbar-role">インストラクター</span>
    </div>
  </div>

  <!-- ===== Screen: Auth ===== -->
  <div id="screen-auth" class="screen active">
    <div class="container" style="padding-top:80px;">
      <h1 style="font-size:22px;font-weight:800;margin-bottom:4px;">インストラクター</h1>
      <p style="font-size:13px;color:var(--gray-500);margin-bottom:32px;">グループ全体の匿名集計データを確認できます。<br>※ 個別の児童データは表示されません。</p>
      <div class="form-group">
        <label class="form-label">インストラクタートークン</label>
        <input class="form-input" id="auth-token" type="text" placeholder="管理者から配布されたトークンを入力">
      </div>
      <button type="button" class="btn-primary" id="btn-auth">ログイン</button>
      <p id="auth-error" style="color:var(--red);font-size:12px;margin-top:8px;display:none;"></p>
    </div>
  </div>

  <!-- ===== Screen: Dashboard ===== -->
  <div id="screen-dashboard" class="screen">
    <div class="dash-container">
      <!-- Group filter -->
      <div style="margin-bottom:16px;">
        <select class="form-select" id="group-filter"><option value="">全グループ</option></select>
      </div>

      <!-- Summary cards -->
      <div class="summary-cards" id="summary-cards"></div>

      <!-- Readiness distribution (anonymous) -->
      <div class="section-header">今日のコンディション分布</div>
      <div class="card" id="distribution-card"></div>

      <!-- Weekly input rate -->
      <div class="section-header">今週の入力率</div>
      <div class="card" id="input-rate-card"></div>

      <!-- Recommended group drill -->
      <div class="section-header">おすすめグループドリル</div>
      <div id="drill-recommendation"></div>

      <p style="text-align:center;margin:32px 0;font-size:12px;color:var(--gray-400);">&copy; 2025 UNLOCK Kids — インストラクター<br>※ すべてのデータは匿名集計です。個人は特定されません。</p>
    </div>
  </div>

  <script src="/kids/js/instructor.js"></script>
</body>
</html>
