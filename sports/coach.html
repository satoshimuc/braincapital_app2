<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNLOCK — Coach Dashboard</title>
  <link rel="stylesheet" href="/sports/css/sports.css">
  <link rel="stylesheet" href="/sports/css/coach.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-config.js"></script>
</head>
<body>

  <!-- ===== Top bar ===== -->
  <div class="topbar">
    <div>
      <span class="topbar-logo">UNLOCK</span>
      <span class="topbar-club" id="topbar-club"></span>
      <span class="topbar-role">Coach</span>
    </div>
    <div class="topbar-right">
      <button type="button" class="btn-text" id="btn-logout">ログアウト</button>
    </div>
  </div>

  <!-- ===== Screen: Login ===== -->
  <div id="screen-login" class="screen active">
    <div class="container" style="padding-top:80px;">
      <h1 style="font-size:22px;font-weight:800;margin-bottom:8px;">コーチ ログイン</h1>
      <p style="font-size:13px;color:var(--gray-500);margin-bottom:32px;">コーチとしてログインしてください。</p>
      <div class="form-group">
        <label class="form-label">アクセストークン</label>
        <input class="form-input" id="login-token" type="password" placeholder="トークンを入力">
      </div>
      <button type="button" class="btn-primary" id="btn-login">ログイン</button>
      <p id="login-error" style="color:var(--red);font-size:12px;margin-top:8px;display:none;"></p>
    </div>
  </div>

  <!-- ===== Screen: Dashboard ===== -->
  <div id="screen-dashboard" class="screen">
    <div class="coach-container">

      <!-- Tabs -->
      <div class="tab-bar">
        <button type="button" class="tab-btn active" data-tab="tab-today">今日のチーム</button>
        <button type="button" class="tab-btn" data-tab="tab-trend">週次トレンド</button>
        <button type="button" class="tab-btn" data-tab="tab-match">試合振り返り</button>
        <button type="button" class="tab-btn" data-tab="tab-drill">おすすめドリル</button>
      </div>

      <!-- TAB: Today -->
      <div id="tab-today" class="tab-content active">
        <!-- Team filter -->
        <div class="form-group" style="margin-bottom:16px;">
          <select class="form-select" id="filter-team" style="max-width:240px;">
            <option value="">全チーム</option>
          </select>
        </div>

        <!-- Summary -->
        <div class="coach-summary">
          <div class="coach-summary-card summary-card-red">
            <div class="coach-summary-value" id="sum-red">0</div>
            <div class="coach-summary-label">要注意</div>
          </div>
          <div class="coach-summary-card summary-card-yellow">
            <div class="coach-summary-value" id="sum-yellow">0</div>
            <div class="coach-summary-label">注意</div>
          </div>
          <div class="coach-summary-card summary-card-green">
            <div class="coach-summary-value" id="sum-green">0</div>
            <div class="coach-summary-label">良好</div>
          </div>
        </div>

        <div class="coach-meta-row">
          <span id="meta-input-rate" style="font-size:12px;color:var(--gray-400);"></span>
          <span id="meta-red-notice" style="font-size:12px;color:var(--red);font-weight:600;"></span>
        </div>

        <!-- Player list -->
        <div class="card" style="padding:0;">
          <div id="player-list"></div>
          <div id="player-empty" class="loading" style="display:none;">選手がまだチェックインしていません。</div>
        </div>
      </div>

      <!-- TAB: Trend -->
      <div id="tab-trend" class="tab-content">
        <div class="card">
          <div class="card-title">チーム平均 Body / Brain Readiness（過去8週）</div>
          <svg id="team-trend-chart" class="trend-chart-lg" viewBox="0 0 700 200"></svg>
          <div class="trend-legend">
            <span class="legend-item"><span class="legend-dot" style="background:var(--accent);"></span>Body</span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--green);"></span>Brain</span>
          </div>
        </div>
      </div>

      <!-- TAB: Match -->
      <div id="tab-match" class="tab-content">
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label">試合を選択</label>
          <select class="form-select" id="match-select" style="max-width:320px;">
            <option value="">選択してください</option>
          </select>
        </div>
        <div id="match-summary"></div>
      </div>

      <!-- TAB: Drill -->
      <div id="tab-drill" class="tab-content">
        <div class="card">
          <div class="card-title">今日のチーム状態に基づくおすすめメニュー</div>
          <div class="card-desc" style="margin-bottom:16px;">ウォーミングアップやクールダウンに取り入れてみてください。</div>
          <div id="drill-suggestions"></div>
        </div>
      </div>

      <p style="text-align:center;margin:24px 0;font-size:12px;color:var(--gray-400);">&copy; 2025 UNLOCK Sports</p>
    </div>
  </div>

  <script src="/sports/js/coach.js"></script>
</body>
</html>
