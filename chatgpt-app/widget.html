<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNLOCK Brain Capital チェック</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #6C63FF;
    --primary-dark: #5A52D5;
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-sub: #6b7280;
    --border: #e5e7eb;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header-icon { font-size: 2rem; margin-bottom: 8px; }
  .header h1 {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }
  .header p {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-top: 4px;
  }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Question Card ── */
  .progress-bar {
    background: var(--border);
    border-radius: 100px;
    height: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    background: var(--primary);
    height: 100%;
    border-radius: 100px;
    transition: width 0.3s ease;
  }
  .question-counter {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin-bottom: 8px;
  }
  .question-category {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--primary);
    background: rgba(108, 99, 255, 0.1);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* ── Scale Buttons ── */
  .scale-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .scale-btn {
    flex: 1;
    padding: 12px 0;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--card-bg);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .scale-btn:hover {
    border-color: var(--primary);
    background: rgba(108, 99, 255, 0.05);
  }
  .scale-btn.selected {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
  }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--text-sub);
    padding: 0 4px;
  }

  /* ── Navigation ── */
  .nav-buttons {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--primary-dark);
  }

  /* ── Results ── */
  .result-score {
    text-align: center;
    padding: 24px;
    background: linear-gradient(135deg, #6C63FF, #8B5CF6);
    border-radius: var(--radius);
    color: #fff;
    margin-bottom: 20px;
  }
  .result-score .score-value {
    font-size: 3rem;
    font-weight: 800;
    line-height: 1;
  }
  .result-score .score-max {
    font-size: 1.2rem;
    opacity: 0.8;
  }
  .result-score .level-badge {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 16px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .result-message {
    font-size: 0.9rem;
    color: var(--text-sub);
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .category-list { list-style: none; }
  .category-item {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .category-item:last-child { border-bottom: none; }
  .category-icon { font-size: 1.2rem; margin-right: 12px; }
  .category-info { flex: 1; }
  .category-name { font-size: 0.85rem; font-weight: 600; }
  .category-advice {
    font-size: 0.75rem;
    color: var(--text-sub);
    margin-top: 2px;
  }
  .category-score {
    font-size: 1.1rem;
    font-weight: 700;
    min-width: 40px;
    text-align: right;
  }
  .score-high { color: var(--success); }
  .score-mid { color: var(--warning); }
  .score-low { color: var(--danger); }

  .retry-btn {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border: 2px solid var(--primary);
    border-radius: var(--radius);
    background: transparent;
    color: var(--primary);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .retry-btn:hover {
    background: rgba(108, 99, 255, 0.05);
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 40px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="screen-start" class="screen active">
  <div class="header">
    <div class="header-icon">🧠</div>
    <h1>UNLOCK Brain Capital チェック</h1>
    <p>5つの質問で日々の生産性習慣をセルフリフレクション</p>
  </div>
  <button class="btn btn-primary" style="width:100%" onclick="startCheck()">チェックを始める</button>
</div>

<!-- Question Screen -->
<div id="screen-question" class="screen">
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="question-counter" id="question-counter"></div>
  <div class="question-category" id="question-category"></div>
  <div class="question-text" id="question-text"></div>
  <div class="scale-buttons" id="scale-buttons"></div>
  <div class="scale-labels">
    <span>当てはまらない</span>
    <span>とても当てはまる</span>
  </div>
  <div class="nav-buttons">
    <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()">戻る</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" disabled>次へ</button>
  </div>
</div>

<!-- Loading Screen -->
<div id="screen-loading" class="screen">
  <div class="loading">
    <div class="spinner"></div>
    <p>結果を計算しています...</p>
  </div>
</div>

<!-- Results Screen -->
<div id="screen-results" class="screen">
  <div class="header">
    <div class="header-icon">🧠</div>
    <h1>リフレクション結果</h1>
  </div>
  <div class="result-score" id="result-score"></div>
  <div class="result-message" id="result-message"></div>
  <ul class="category-list" id="category-list"></ul>
  <button class="retry-btn" onclick="retry()">もう一度チェックする</button>
</div>

<script>
  // ── MCP Apps Bridge ──
  // Communication with ChatGPT host via postMessage (JSON-RPC 2.0)
  let rpcId = 0;
  const pendingCalls = new Map();

  function sendRpc(method, params) {
    return new Promise((resolve, reject) => {
      const id = ++rpcId;
      pendingCalls.set(id, { resolve, reject });
      window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
    });
  }

  window.addEventListener("message", (event) => {
    const msg = event.data;
    if (!msg || msg.jsonrpc !== "2.0") return;

    // Response to our call
    if (msg.id && pendingCalls.has(msg.id)) {
      const { resolve, reject } = pendingCalls.get(msg.id);
      pendingCalls.delete(msg.id);
      if (msg.error) reject(msg.error);
      else resolve(msg.result);
      return;
    }

    // Notification from host (tool input/result)
    if (msg.method === "ui/notifications/tool-input") {
      handleToolInput(msg.params);
    }
    if (msg.method === "ui/notifications/tool-result") {
      handleToolResult(msg.params);
    }
  });

  async function callTool(name, args) {
    try {
      return await sendRpc("tools/call", { name, arguments: args });
    } catch (e) {
      console.error("Tool call error:", e);
      return null;
    }
  }

  // ── Brain Check State ──
  const ITEMS = [
    { id: "BC-01", category: "sleep",     label: "睡眠の質",               icon: "🌙", question: "毎日十分な睡眠がとれ、朝すっきり目覚められている" },
    { id: "BC-02", category: "exercise",  label: "運動習慣",               icon: "🏃", question: "定期的に体を動かし、運動後に頭がクリアになる感覚がある" },
    { id: "BC-03", category: "stress",    label: "ストレスマネジメント",     icon: "🧘", question: "ストレスを適切にコントロールでき、意欲を維持できている" },
    { id: "BC-04", category: "nutrition", label: "食事とエネルギー管理",     icon: "🥗", question: "バランスの良い食事や十分な水分補給を意識的に行えている" },
    { id: "BC-05", category: "rest",      label: "休息とリフレッシュ",      icon: "☕", question: "意識的な休憩やリフレッシュの時間を確保できている" },
  ];

  let currentQ = 0;
  let answers = {};

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
    document.getElementById("screen-" + id).classList.add("active");
  }

  function startCheck() {
    currentQ = 0;
    answers = {};
    showScreen("question");
    renderQuestion();
  }

  function renderQuestion() {
    const item = ITEMS[currentQ];
    const total = ITEMS.length;

    document.getElementById("progress-fill").style.width = ((currentQ + 1) / total * 100) + "%";
    document.getElementById("question-counter").textContent = `質問 ${currentQ + 1} / ${total}`;
    document.getElementById("question-category").textContent = item.icon + " " + item.label;
    document.getElementById("question-text").textContent = item.question;

    // Scale buttons
    const container = document.getElementById("scale-buttons");
    container.innerHTML = "";
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement("button");
      btn.className = "scale-btn" + (answers[item.id] === i ? " selected" : "");
      btn.textContent = i;
      btn.onclick = () => selectAnswer(item.id, i);
      container.appendChild(btn);
    }

    // Nav
    document.getElementById("btn-prev").style.display = currentQ === 0 ? "none" : "";
    const nextBtn = document.getElementById("btn-next");
    nextBtn.disabled = !answers[item.id];
    nextBtn.textContent = currentQ === total - 1 ? "結果を見る" : "次へ";
  }

  function selectAnswer(id, value) {
    answers[id] = value;
    // Update button states
    document.querySelectorAll(".scale-btn").forEach((btn, i) => {
      btn.classList.toggle("selected", i + 1 === value);
    });
    document.getElementById("btn-next").disabled = false;
  }

  function prevQuestion() {
    if (currentQ > 0) {
      currentQ--;
      renderQuestion();
    }
  }

  async function nextQuestion() {
    if (currentQ < ITEMS.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      // Submit
      showScreen("loading");
      const result = await callTool("submit_brain_check", {
        bc01: answers["BC-01"],
        bc02: answers["BC-02"],
        bc03: answers["BC-03"],
        bc04: answers["BC-04"],
        bc05: answers["BC-05"],
      });
      if (result && result.content) {
        try {
          const data = JSON.parse(result.content[0].text);
          showResults(data);
        } catch (e) {
          showResultsFallback();
        }
      } else {
        showResultsFallback();
      }
    }
  }

  function showResults(data) {
    showScreen("results");

    document.getElementById("result-score").innerHTML =
      `<div class="score-value">${data.total}</div>` +
      `<div class="score-max">/ ${data.maxScore}</div>` +
      `<div class="level-badge">Level ${data.level}：${data.levelLabel}</div>`;

    document.getElementById("result-message").textContent = data.message;

    const list = document.getElementById("category-list");
    list.innerHTML = "";
    (data.categories || []).forEach((cat) => {
      const scoreClass = cat.score >= 4 ? "score-high" : cat.score >= 3 ? "score-mid" : "score-low";
      const icon = ITEMS.find((i) => i.id === cat.id)?.icon || "📊";
      list.innerHTML +=
        `<li class="category-item">` +
          `<span class="category-icon">${icon}</span>` +
          `<div class="category-info">` +
            `<div class="category-name">${cat.label}</div>` +
            (cat.advice ? `<div class="category-advice">${cat.advice}</div>` : "") +
          `</div>` +
          `<div class="category-score ${scoreClass}">${cat.score}/5</div>` +
        `</li>`;
    });
  }

  function showResultsFallback() {
    // If MCP tool call fails, calculate locally
    const total = Object.values(answers).reduce((s, v) => s + v, 0);
    const level = total >= 22 ? "S" : total >= 18 ? "A" : total >= 13 ? "B" : total >= 8 ? "C" : "D";
    const labels = { S: "エリート", A: "好調", B: "まずまず", C: "伸びしろあり", D: "スタートライン" };

    showResults({
      total,
      maxScore: 25,
      level,
      levelLabel: labels[level],
      message: "結果を表示しています（オフラインモード）",
      categories: ITEMS.map((item) => ({
        id: item.id,
        category: item.category,
        label: item.label,
        score: answers[item.id] || 0,
        advice: null,
      })),
    });
  }

  function retry() {
    currentQ = 0;
    answers = {};
    showScreen("start");
  }

  // Handle tool input from ChatGPT host
  function handleToolInput(params) {
    if (params && params.toolName === "start_brain_check") {
      startCheck();
    }
  }

  function handleToolResult(params) {
    if (params && params.toolName === "submit_brain_check") {
      try {
        const data = JSON.parse(params.content[0].text);
        showResults(data);
      } catch (e) {
        // ignore parse errors
      }
    }
  }
</script>
</body>
</html>
