openapi: 3.1.0
info:
  title: UNLOCK Brain Capital チェック API
  description: 脳資本（Brain Capital）の健康状態を5つの質問でセルフチェックし、結果を保存・取得するAPI
  version: 1.0.0
servers:
  - url: https://braincapital.vercel.app
    description: Production server
paths:
  /api/brain-check:
    get:
      operationId: getBrainCheckQuestions
      summary: 5項目のBrainチェック質問を取得する
      description: 診断に使用する5つの質問項目とスケール定義を返す
      responses:
        "200":
          description: 質問項目一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    example: "UNLOCK Brain Capital チェック"
                  description:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "BC-01"
                        category:
                          type: string
                          example: "sleep"
                        label:
                          type: string
                          example: "睡眠と回復"
                        question:
                          type: string
                  scale:
                    type: object
                    properties:
                      min:
                        type: integer
                      max:
                        type: integer
                      labels:
                        type: object
    post:
      operationId: submitBrainCheck
      summary: Brainチェックの回答を送信し結果を取得する
      description: 5項目の回答（各1-5）を送信し、スコア算出・保存・結果返却を行う
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - answers
              properties:
                answers:
                  type: object
                  description: 質問IDをキー、スコア(1-5)を値とするオブジェクト
                  properties:
                    BC-01:
                      type: integer
                      minimum: 1
                      maximum: 5
                      description: "睡眠と回復のスコア"
                    BC-02:
                      type: integer
                      minimum: 1
                      maximum: 5
                      description: "運動と身体活動のスコア"
                    BC-03:
                      type: integer
                      minimum: 1
                      maximum: 5
                      description: "ストレスとメンタルヘルスのスコア"
                    BC-04:
                      type: integer
                      minimum: 1
                      maximum: 5
                      description: "栄養と脳の燃料のスコア"
                    BC-05:
                      type: integer
                      minimum: 1
                      maximum: 5
                      description: "休息とリカバリーのスコア"
                  required:
                    - BC-01
                    - BC-02
                    - BC-03
                    - BC-04
                    - BC-05
                user_id:
                  type: string
                  description: オプションのユーザー識別子
      responses:
        "200":
          description: 診断結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
                    properties:
                      sessionId:
                        type: string
                      total:
                        type: integer
                        description: 合計スコア（5-25）
                      maxScore:
                        type: integer
                      percentage:
                        type: integer
                      level:
                        type: string
                        enum: [S, A, B, C, D]
                      levelLabel:
                        type: string
                      categories:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            category:
                              type: string
                            label:
                              type: string
                            score:
                              type: integer
                            advice:
                              type: string
                              nullable: true
                      strengths:
                        type: array
                        items:
                          type: string
                      weaknesses:
                        type: array
                        items:
                          type: string
                      message:
                        type: string
        "400":
          description: バリデーションエラー
  /api/brain-check-history:
    get:
      operationId: getBrainCheckHistory
      summary: 過去の診断結果を取得する
      description: ユーザーの過去10回分の診断結果を取得し、トレンドを表示する
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
          description: ユーザーID（省略時はopenai-ephemeral-user-idを使用）
      responses:
        "200":
          description: 過去の診断結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date-time
                        total:
                          type: integer
                        level:
                          type: string
                        levelLabel:
                          type: string
                        categories:
                          type: object
                  trend:
                    type: string
                    enum: [improving, declining, stable, insufficient_data]
